deck:
  total_content_slides: 32
  title: "High-throughput DFT and small-sample ML for chalcogenide PV absorber discovery, with device-scale validation"
  authors: "Xuanyan Chen et al."
  affiliation: "HKUST(GZ) — 3rd JMI conference 2026"

slides:
  - kind: cover

  - kind: divider
    number: "01"
    title: "PROBLEM"

  - kind: content
    section_label: "01 · PROBLEM"
    index: 2
    title: "Efficiency–stability design space for thin-film photovoltaics"
    subtitle: "Two established regimes, one unoccupied region"
    bullets:
      - "Si: indirect band gap, ~22 % single-junction PCE ceiling, T[sub]80[/sub] [sup]>[/sup] 10[sup]4[/sup] h"
      - "CIGS: direct-gap chalcogenide, 23.4 % record, constrained by In and Ga reserves"
      - "Perovskite: PCE [sup]>[/sup] 26 %, T[sub]80[/sub] frequently < 500 h under 1-sun, 85 °C"
      - "Detailed-balance limit at E[sub]g[/sub] ≈ 1.34 eV reaches 33.7 % [Shockley & Queisser 1961]"
      - "Target region: PCE [sup]>[/sup] 25 % combined with T[sub]80[/sub] [sup]>[/sup] 10[sup]5[/sup] h is currently unoccupied"
      - "These constraints motivate a third absorber class with a direct or near-direct gap"
    figure: "figures/output/s2_eff_stability.png"

  - kind: content
    section_label: "01 · PROBLEM"
    index: 3
    title: "CIGS — Cu(In,Ga)Se[sub]2[/sub] chalcopyrite absorber"
    subtitle: "Tetragonal I-4̄2d · cation-ordered diamond-like sublattice · tunable direct gap"
    bullets:
      - "Stoichiometry Cu(In,Ga)Se[sub]2[/sub]; In and Ga share a single cation site at composition x = Ga / (In + Ga)"
      - "Lattice parameters a ≈ 5.78 Å · c ≈ 11.62 Å with c / a ≈ 2 (chalcopyrite = doubled zincblende)"
      - "Direct band gap tunable approximately linearly from 1.04 eV (CuInSe[sub]2[/sub]) to 1.68 eV (CuGaSe[sub]2[/sub])"
      - "Polycrystalline thin-film absorber 1–3 µm on a Mo back contact; CdS / ZnO buffer + window stack"
      - "Champion lab cell PCE 23.4 % (Solar Frontier 2019); module reliability T[sub]80[/sub] [sup]>[/sup] 25 yr in field"
      - "In-free sister chalcogenide kesterite Cu[sub]2[/sub]ZnSn(S,Se)[sub]4[/sub] explored at HKUST(GZ) [Yan et al. Nat. Energy 2018 · ACS Energy Lett. 2017]"
    figure: "figures/output/s3_cigs_structure.png"

  - kind: content
    section_label: "01 · PROBLEM"
    index: 4
    title: "Perovskite — ABX[sub]3[/sub] structural family"
    subtitle: "Pm-3̄m cubic parent · corner-sharing BX[sub]6[/sub] octahedral framework"
    bullets:
      - "General formula ABX[sub]3[/sub]: A = Cs[sup]+[/sup] / MA[sup]+[/sup] (CH[sub]3[/sub]NH[sub]3[/sub][sup]+[/sup]) / FA[sup]+[/sup] · B = Pb[sup]2+[/sup] / Sn[sup]2+[/sup] · X = I / Br / Cl"
      - "BX[sub]6[/sub] octahedra share corners; A cation occupies the 12-coordinated cuboctahedral void"
      - "Stability set by Goldschmidt tolerance factor t = (r[sub]A[/sub] + r[sub]X[/sub]) / (√2 (r[sub]B[/sub] + r[sub]X[/sub])); cubic perovskite for 0.9 ≤ t ≤ 1.0"
      - "Direct band gap, strong absorption (α ≈ 10[sup]5[/sup] cm[sup]−1[/sup] near band edge), long carrier diffusion lengths"
      - "Champion single-junction PCE 26.7 % (UNIST 2024); inverted PSC 22.3 % via ligand anchoring [Hou et al. Nat. Energy 2020]"
      - "Tandem records: monolithic perovskite / Si tandem and 24.2 % all-perovskite tandem [Hou et al. Science 2020 · Nat. Energy 2020]"
    figure: "figures/output/s4_perovskite_structure.png"

  - kind: content
    section_label: "01 · PROBLEM"
    index: 5
    title: "Limitations of the established absorbers"
    subtitle: "Record-cell PCE timeline and accelerated-aging stability gap"
    bullets:
      - "Si record 27.6 % (UNSW 2024) — five decades of incremental improvement"
      - "Perovskite record 26.7 % (UNIST 2024) — single-junction parity with Si in under a decade"
      - "Stability gap remains [sup]>[/sup] 100× under operating stress (ion migration, A-site loss, photo-induced degradation)"
      - "Encapsulation mitigates ingress but does not address intrinsic absorber-side instability [Boyd et al. 2019]"
      - "Module-scale commercial deployment requires both record-class efficiency and outdoor lifetime"
      - "Motivates the discovery of new absorber chemistries that satisfy both criteria simultaneously"
    figure: null

  - kind: content
    section_label: "01 · PROBLEM"
    index: 6
    title: "Talk outline"
    subtitle: "Six stages connecting the materials database to predicted device performance"
    bullets:
      - "01 PROBLEM — efficiency–stability tradeoff, CIGS and perovskite definitions (5 slides)"
      - "02 STRATEGY — chalcogenide structural template"
      - "03 ML AND FEATURES — small-sample HSE06 surrogate (8 slides)"
      - "04 CANDIDATES — fourteen-material shortlist"
      - "05 BRIDGE — 1D and 2D drift-diffusion device simulation (8 slides)"
      - "06 PAYOFF — predicted device J–V and outlook"
    figure: "figures/output/s4_funnel.png"

  - kind: divider
    number: "02"
    title: "STRATEGY"

  - kind: content
    section_label: "02 · STRATEGY"
    index: 7
    title: "Chalcogenide templates as the structural prior"
    subtitle: "AB[sub]2[/sub]C[sub]4[/sub] and ABC[sub]3[/sub] frameworks with heavy-p-block cations on chalcogen anions"
    bullets:
      - "Anion sublattice: S, Se, Te. Selenides comprise 11 of 14 shortlisted candidates, including the top six"
      - "Active cation: Sb, Sn, Bi (6s[sup]2[/sup] / 5s[sup]2[/sup] lone pair) producing dispersive valence-band maxima"
      - "Spectator cation: Cs, Ca, Sr, K donate charge without contracting the valence-band dispersion"
      - "Stoichiometry preference: AB[sub]2[/sub]C[sub]4[/sub] [sup]≫[/sup] ABC[sub]3[/sub] ≈ ABC[sub]2[/sub] in the screened subset"
      - "Symmetry distribution: Pnma (SG 62) is dominant; followed by SG 12, 14, 72 and 15"
      - "Constrains the > 10[sup]5[/sup] candidate pool to a physically plausible, synthetically accessible subspace"
    figure: null

  - kind: content
    section_label: "02 · STRATEGY"
    index: 8
    title: "End-to-end pipeline"
    subtitle: "MP / OQMD → ML surrogate → DFT validation → device sim → expt"
    bullets: []
    figure: "figures/output/s6_pipeline.png"

  - kind: divider
    number: "03"
    title: "ML + FEATURES"

  - kind: content
    section_label: "03 · ML + FEATURES"
    index: 9
    title: "Motivation for a learned surrogate"
    subtitle: "Four-stage HSE06 and DFPT workflow executed in VASP for each candidate"
    bullets:
      - "Stage 1 PBE relaxation → Stage 2 SCF → Stage 3 DFPT dielectric tensor → Stage 4 HSE06 band structure"
      - "DFPT and HSE06 dominate runtime, requiring 10[sup]0[/sup]–10[sup]2[/sup] CPU-hours per structure on a 64-core node"
      - "PBE relaxation scales as O(N[sup]3[/sup]) in plane-wave eigensolve; HSE06 adds ~10× overhead via exact exchange [Heyd et al. 2003]"
      - "DFPT dielectric tensor obtained from the linear-response Sternheimer equation at ~2× SCF cost [Baroni et al. 2001]"
      - "Combined MP and OQMD pool exceeds 10[sup]5[/sup] candidates, rendering full-DFT enumeration computationally infeasible"
      - "Approach: train a learned surrogate on 473 DFT-labelled materials and use it to rank the unlabelled pool"
    figure: null

  - kind: content
    section_label: "03 · ML + FEATURES"
    index: 10
    title: "Hand-crafted feature set (167 D)"
    subtitle: "Composition · structure · symmetry — Magpie + matminer"
    bullets:
      - "Composition (~27 D): Magpie statistics over Z, χ, atomic radius, row, group, mass [Ward et al. 2016]"
      - "Magpie reduces a formula A[sub]a[/sub]B[sub]b[/sub]C[sub]c[/sub] to mean / std / min / max / mode of element properties weighted by stoichiometry"
      - "Structure (140 D): CrystalNN site-fingerprint (122) + RDF + density + packing [matminer · Ward et al. 2018]"
      - "All featurisers tolerate NaN — routed to the appropriate side of every HistGBR split"
      - "Cached numpy matrices on disk → re-fits run in seconds, not minutes"
      - "Frozen MEGNet 16-D embeddings give R[sup]2[/sup] = 0.366 — below hand-features baseline [Chen et al. 2019]"
    figure: "figures/output/s8_features.png"

  - kind: content
    section_label: "03 · ML + FEATURES"
    index: 11
    title: "Composite photovoltaic figure of merit"
    subtitle: "Four physically motivated factors combined into a single scalar target y ∈ [0, 1]"
    bullets:
      - "y = f[sub]gap[/sub](E[sub]g[/sub]) · 1 / (1 + m[sub]avg[/sub]) · tanh(ε / 10) · 1 / (1 + E[sub]b[/sub] / 0.1)"
      - "f[sub]gap[/sub](E[sub]g[/sub]): triangular Shockley–Queisser window peaked at 1.34 eV, vanishing at 0.5 and 2.5 eV"
      - "1 / (1 + m[sub]avg[/sub]): monotonic decay rewarding low effective mass and therefore high mobility"
      - "tanh(ε / 10): saturates above ε ≈ 10 to reflect diminishing returns from dielectric screening"
      - "1 / (1 + E[sub]b[/sub] / 0.1): favours Wannier–Mott regimes (E[sub]b[/sub] < 0.1 eV) and penalises Frenkel-exciton systems"
      - "Bounded, differentiable, physically interpretable; replaces four independent regression heads with one"
    figure: "figures/output/s11_pv_score_factors.png"

  - kind: content
    section_label: "03 · ML + FEATURES"
    index: 12
    title: "Histogram-based gradient boosting regression"
    subtitle: "Stage-wise additive function approximation [Friedman 2001 · Ke et al. 2017]"
    bullets:
      - "F[sub]m[/sub](x) = F[sub]m-1[/sub](x) + ν · h[sub]m[/sub](x), where h[sub]m[/sub] fits the negative gradient of the loss at F[sub]m-1[/sub]"
      - "Histogram binning into 256 discrete buckets reduces a split scan from O(N) to O(B), yielding ~3× speedup"
      - "Native NaN handling: missing values learn an independent split direction at each tree node"
      - "Hyperparameters: 600 boosting iterations · maximum depth 4 · learning rate 0.05 · minimum samples per leaf 10"
      - "Target wrapped in log[sub]1[/sub]p(y / 0.08) by TransformedTargetRegressor; inverse via 0.08 · expm1"
      - "Logarithmic transform compresses the heavy-tailed PV-score distribution and equalises booster resolution near peak (y ≈ 0.5) and bulk (y ≈ 0.01)"
    figure: "figures/output/s12_histgbr_schematic.png"

  - kind: content
    section_label: "03 · ML + FEATURES"
    index: 13
    title: "Gaussian-process and random-forest uncertainty stack"
    subtitle: "Matérn-5/2 kernel with additive white noise [Rasmussen & Williams 2006]"
    bullets:
      - "k(x, x[sup]'[/sup]) = σ[sub]f[/sub][sup]2[/sup] (1 + √5 r + (5/3) r[sup]2[/sup]) exp(−√5 r) + σ[sub]n[/sub][sup]2[/sup] δ(x − x[sup]'[/sup])"
      - "r = ‖x − x[sup]'[/sup]‖ / ℓ; the anisotropic length-scale ℓ is optimised by L-BFGS-B on the marginal log-likelihood"
      - "White-noise variance σ[sub]n[/sub][sup]2[/sup] absorbs DFT scatter, typically 0.02 – 0.05 on the log target"
      - "A random-forest predictor (300 trees) compensates for GP underconfidence in sparsely sampled regions"
      - "Stack mean: μ(x) = w[sub]GP[/sub] μ[sub]GPR[/sub] + w[sub]RF[/sub] μ[sub]RF[/sub] · variance: σ[sup]2[/sup](x) = w[sub]GP[/sub][sup]2[/sup] σ[sub]GPR[/sub][sup]2[/sup] + w[sub]RF[/sub][sup]2[/sup] σ[sub]RF[/sub][sup]2[/sup]"
      - "Mixing weights are obtained via non-negative ridge regression on out-of-fold predictions, ensuring calibration"
    figure: "figures/output/s13_gp_rf_uncertainty.png"

  - kind: content
    section_label: "03 · ML + FEATURES"
    index: 14
    title: "Upper-confidence-bound acquisition for active learning"
    subtitle: "Sequential selection of the next DFT batch [Snoek et al. 2012]"
    bullets:
      - "α[sub]UCB[/sub](x) = μ(x) + κ · σ(x), with κ = 2"
      - "Posterior mean μ(x) is taken from HistGBR, the more accurate mean predictor on labelled data"
      - "Posterior standard deviation σ(x) is taken from the GPR + RF stack as a calibrated uncertainty source"
      - "κ = 2 balances exploitation (high μ) and exploration (high σ) and is standard in Bayesian optimisation"
      - "Decoupling μ and σ between two models prevents GP underconfidence from suppressing the high-score tail"
      - "Top-N entries by α become the next active-learning DFT batch; returned labels are fed back into both models"
    figure: "figures/output/s14_ucb_acquisition.png"

  - kind: content
    section_label: "03 · ML + FEATURES"
    index: 15
    title: "Validation under random and grouped cross-validation"
    subtitle: "5-fold × 5-seed random CV on n = 473 labelled materials"
    bullets:
      - "HistGBR achieves R[sup]2[/sup] = 0.466 ± 0.035 · MAE = 0.012 · top-20 recall 0.50"
      - "Improves over the prior GPR / GB / ExtraTrees baseline by +50 % in R[sup]2[/sup] (0.31 → 0.466)"
      - "Ablation: GBR 0.399 · ExtraTrees 0.234 · MEGNet fine-tuned 0.307 · MEGNet frozen 0.366"
      - "Repeated out-of-fold averaging across seeds yields global R[sup]2[/sup] = 0.492 and top-20 recall 0.50"
      - "Prototype-grouped CV gives R[sup]2[/sup] ≈ 0, indicating poor extrapolation to unseen structural prototypes"
      - "Chalcogen-family-grouped CV gives R[sup]2[/sup] ≈ 0.15, with Se the most challenging hold-out"
    figure: "figures/output/s10_parity.png"

  - kind: content
    section_label: "03 · ML + FEATURES"
    index: 16
    title: "Per-group residual audit"
    subtitle: "Diagnostic informing the next active-learning batch"
    bullets:
      - "Score = RMSE · √n + 0.02 · (missed top-20), penalising ranking errors at the high-score tail"
      - "Se (n = 182): RMSE 0.042, 17 true top-20 candidates, 9 missed by HistGBR — highest priority"
      - "High-score bin (y > 0.1, n = 14): RMSE 0.145, identifying the under-modelled tail"
      - "Pnma (SG 62, n = 182): RMSE 0.034, 4 of 10 true top-20 missed"
      - "AB[sub]2[/sub]C[sub]4[/sub] (n = 91): RMSE 0.045, 1 of 7 true top-20 missed"
      - "ABC[sub]3[/sub] (n = 56): RMSE 0.045, 50 % top-20 miss rate — the most pronounced data-coverage gap"
    figure: "figures/output/s16_per_group_residual.png"

  - kind: divider
    number: "04"
    title: "CANDIDATES"

  - kind: content
    section_label: "04 · CANDIDATES"
    index: 17
    title: "Top-fourteen candidates (PV score y > 0.10)"
    subtitle: "All entries are chalcogenides; eleven of fourteen are selenides; AB[sub]2[/sub]C[sub]4[/sub] is the dominant prototype"
    bullets:
      - "Selenides preferred: 11 of 14 are Se-based and the top six are all Se"
      - "AB[sub]2[/sub]C[sub]4[/sub] supplies 7 of 14 entries; the remainder is split between ABC[sub]3[/sub] and ABC[sub]2[/sub]"
      - "Pnma (SG 62) accounts for 7 of 14; remaining entries fall in SG 12, 14, 72 and 15"
      - "PV-score distribution spans 0.10 to 0.49 across the shortlist"
      - "Aggregate descriptors: ⟨E[sub]g[/sub]⟩ = 1.32 eV · ⟨ε⟩ = 12.5 · ⟨m[sub]avg[/sub]⟩ = 0.58 m[sub]0[/sub]"
      - "24 % are direct-gap; the remaining 76 % are retained for combined low m[sup]*[/sup], high ε and low E[sub]b[/sub]"
    figure: "figures/output/s11_top_candidates.png"

  - kind: content
    section_label: "04 · CANDIDATES"
    index: 18
    title: "Screening funnel"
    subtitle: ">10[sup]5[/sup] MP / OQMD → 647 DFT-screened → 473 ML-ready → 41 PV-promising → 14 shortlist"
    bullets:
      - "Stage 1: > 10[sup]5[/sup] structures sourced from Materials Project and OQMD"
      - "Stage 2: 647 candidates with HSE band structure and DFPT dielectric tensor completed"
      - "Stage 3: 473 ML-ready candidates after removing metallic-band and missing-CONTCAR entries (174 excluded)"
      - "Stage 4: 41 PV-promising candidates with composite score y [sup]>[/sup] 0.05"
      - "Stage 5: 14-candidate shortlist with y [sup]>[/sup] 0.10 feeding the next active-learning DFT round"
      - "Funnel narrows by approximately four orders of magnitude into a tractable shortlist for experimental verification"
    figure: "figures/output/s12_funnel_population.png"

  - kind: content
    section_label: "04 · CANDIDATES"
    index: 19
    title: "Lead candidate — Se[sub]16[/sub]Sn[sub]8[/sub]Zr[sub]4[/sub]"
    subtitle: "AB[sub]2[/sub]C[sub]4[/sub] prototype · Pnma (SG 62) · near-optimal Shockley–Queisser gap"
    bullets:
      - "E[sub]g[/sub] = 1.12 eV, within 0.22 eV of the Shockley–Queisser optimum at 1.34 eV"
      - "m[sub]avg[/sub] = 0.43 m[sub]0[/sub], indicating low effective mass and high carrier mobility"
      - "ε[sub]avg[/sub] = 19.5, providing strong dielectric screening and suppressing Frenkel-exciton formation"
      - "E[sub]b[/sub] = 7 meV, well below k[sub]B[/sub]T at 300 K, placing the absorber in the Wannier–Mott regime"
      - "Composite PV score y = 0.487, the highest in the screened set"
      - "Sn–Zr–Se ternary phases have reported synthesis routes; no photovoltaic-device demonstration to date"
    figure: "figures/output/s13_hit1_Se16Sn8Zr4.png"

  - kind: content
    section_label: "04 · CANDIDATES"
    index: 20
    title: "Secondary candidate — Cs[sub]2[/sub]Sb[sub]6[/sub]Se[sub]2[/sub]"
    subtitle: "ABC[sub]3[/sub] prototype · C2/m (SG 12) · Sb 5s[sup]2[/sup] lone-pair active cation"
    bullets:
      - "E[sub]g[/sub] = 1.28 eV, near the Shockley–Queisser optimum"
      - "m[sub]avg[/sub] = 0.81 m[sub]0[/sub], heavier than the lead candidate but within the device-relevant range"
      - "ε[sub]avg[/sub] = 12.6, indicating moderate dielectric screening; E[sub]b[/sub] = 56 meV"
      - "Composite PV score y = 0.298, complementing the lead candidate from a distinct structural prototype"
      - "Sb 5s[sup]2[/sup] lone-pair character produces a deep, dispersive valence-band maximum"
      - "Cs–Sb–Se ternary phases have established solution-processing synthesis routes"
    figure: "figures/output/s14_hit2_Cs2Sb6Se2.png"

  - kind: divider
    number: "05"
    title: "BRIDGE — DEVICE SIM"

  - kind: content
    section_label: "05 · BRIDGE"
    index: 21
    title: "Motivation for device-scale simulation"
    subtitle: "Bulk material descriptors alone do not determine device-level performance"
    bullets:
      - "DFT delivers E[sub]g[/sub], m[sup]*[/sup], ε and E[sub]b[/sub] as bulk material-level descriptors"
      - "Device performance additionally depends on stack geometry, contact selectivity, optical absorption and recombination kinetics"
      - "Drift-diffusion coupled to the Poisson equation is required across the full HTL / absorber / ETL stack"
      - "Coherent transfer-matrix-method (TMM) optics are required for thin-film interference [Pettersson et al. 1999]"
      - "Two-dimensional effects (grain boundaries, lateral non-uniformity) cannot be captured in 1D"
      - "Mobile-ion transport must be included to reproduce hysteresis in perovskite-class absorbers"
    figure: "figures/output/s21_bulk_vs_device.png"

  - kind: content
    section_label: "05 · BRIDGE"
    index: 22
    title: "SolarLab device-simulation framework"
    subtitle: "1D + 2D drift-diffusion · TMM optics · mobile ions · selective Robin contacts"
    bullets:
      - "Backend: Python solver with FastAPI server-sent events streaming intermediate results"
      - "Frontend: TypeScript / Vite workstation with publication-quality figure rendering"
      - "Numerical scheme: Radau implicit Runge–Kutta with BDF fallback and bisection-in-time on stiff steps"
      - "Optics: coherent transfer-matrix-method using the ASTM G-173 AM1.5G reference spectrum"
      - "Selective contacts: Robin formulation in S[sub]n[/sub] and S[sub]p[/sub], validated against the 1D solver to 6 µV"
      - "Open-source, scriptable and REST-driven; designed for integration into high-throughput screening pipelines"
    figure: "figures/output/s22_framework.png"

  - kind: content
    section_label: "05 · BRIDGE"
    index: 23
    title: "Drift-diffusion governing equations"
    subtitle: "Three coupled partial differential equations per absorber layer [Selberherr 1984]"
    bullets:
      - "Electron continuity: ∂n/∂t = (1/q) ∇·J[sub]n[/sub] + G − R"
      - "Hole continuity:     ∂p/∂t = −(1/q) ∇·J[sub]p[/sub] + G − R"
      - "Poisson equation: ∇·(ε[sub]r[/sub] ε[sub]0[/sub] ∇φ) = −q (p − n + N[sub]D[/sub] − N[sub]A[/sub] + ρ[sub]ion[/sub])"
      - "Current densities: J[sub]n[/sub] = q μ[sub]n[/sub] n E + q D[sub]n[/sub] ∇n · J[sub]p[/sub] = q μ[sub]p[/sub] p E − q D[sub]p[/sub] ∇p"
      - "Recombination R: Shockley–Read–Hall, Auger and radiative channels; Einstein relation D = (k[sub]B[/sub]T/q) μ"
      - "Generation G: optical generation profile from the TMM model integrated over the AM1.5G spectrum"
    figure: "figures/output/s23_band_diagram.png"

  - kind: content
    section_label: "05 · BRIDGE"
    index: 24
    title: "Transfer-matrix-method optics"
    subtitle: "Coherent multi-layer thin-film interference [Pettersson et al. 1999 · Born & Wolf]"
    bullets:
      - "Each layer j is represented by a 2×2 characteristic matrix L[sub]j[/sub] acting on the tangential (E, H) field components"
      - "L[sub]j[/sub] = [[cos δ[sub]j[/sub], i sin δ[sub]j[/sub] / η[sub]j[/sub]], [i η[sub]j[/sub] sin δ[sub]j[/sub], cos δ[sub]j[/sub]]]"
      - "Phase thickness δ[sub]j[/sub] = (2π / λ) ñ[sub]j[/sub] d[sub]j[/sub] cos θ[sub]j[/sub] with complex refractive index ñ[sub]j[/sub] = n + i k"
      - "System matrix M = L[sub]1[/sub] L[sub]2[/sub] … L[sub]N[/sub] yields wavelength-resolved R, T and A"
      - "Generation profile G(x, λ) ∝ |E(x, λ)|[sup]2[/sup] α(λ), integrated over the AM1.5G spectrum"
      - "Supersedes the Beer–Lambert approximation by capturing interference, back-reflector and interface effects"
    figure: "figures/output/s24_tmm_interference.png"

  - kind: content
    section_label: "05 · BRIDGE"
    index: 25
    title: "Mobile-ion transport"
    subtitle: "Origin of J–V hysteresis in perovskite solar cells [Calado et al. 2016 · van Reenen et al. 2015]"
    bullets:
      - "Continuity for ion-vacancy density P: ∂P/∂t = ∇·(D[sub]ion[/sub] ∇P + μ[sub]ion[/sub] P (1 − P / P[sub]lim[/sub]) ∇φ)"
      - "The steric factor (1 − P / P[sub]lim[/sub]) caps ion density at the available lattice-site limit"
      - "Estimated P[sub]lim[/sub] is approximately 1 – 5 % of the cation-site density in MAPbI[sub]3[/sub]"
      - "Ion drift under bias redistributes mobile charge, screens the electric field and modulates the recombination rate"
      - "Couples into the Poisson equation via the source term ρ[sub]ion[/sub] = q (P − P[sub]eq[/sub])"
      - "Characteristic time scale of 0.01 – 100 s reproduces the observed scan-rate dependence of perovskite J–V curves"
    figure: "figures/output/s25_mobile_ions.png"

  - kind: content
    section_label: "05 · BRIDGE"
    index: 26
    title: "Selective Robin contact boundary conditions"
    subtitle: "Surface-recombination boundary conditions in place of Dirichlet pinning"
    bullets:
      - "Left contact: J[sub]n[/sub] = −q S[sub]n,L[/sub] (n − n[sub]eq[/sub]) · J[sub]p[/sub] = +q S[sub]p,L[/sub] (p − p[sub]eq[/sub])"
      - "Right contact: J[sub]n[/sub] = +q S[sub]n,R[/sub] (n − n[sub]eq[/sub]) · J[sub]p[/sub] = −q S[sub]p,R[/sub] (p − p[sub]eq[/sub])"
      - "Contact selectivity: S[sub]n,L[/sub] [sup]≪[/sup] S[sub]p,L[/sub] yields a hole-extracting (HTL-type) left contact"
      - "Limit S → ∞ recovers the Dirichlet condition (carrier density pinned to equilibrium)"
      - "Limit S → 0 yields a perfectly blocking (zero-flux Neumann) contact"
      - "Captures the surface-recombination physics that SCAPS-1D approximates via Dirichlet pinning"
    figure: "figures/output/s26_robin_contacts.png"

  - kind: content
    section_label: "05 · BRIDGE"
    index: 27
    title: "Capability comparison with SCAPS-1D"
    subtitle: "Capabilities absent from the SCAPS-1D reference solver [Burgelman et al. 2000]"
