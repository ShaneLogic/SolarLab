# Layer template library for Phase 2b custom-stack builder.
# Each entry: role, optical_material (or null), description, source, defaults.
# Defaults come from cited published cells; tune at PR review if a stack
# fails to converge during the manual verification pass.

glass_substrate:
  role: substrate
  optical_material: glass
  description: "BK7-equivalent glass substrate (1 mm) — front side"
  source: "Schott BK7 datasheet"
  defaults:
    thickness: 1.0e-3
    incoherent: true
    eps_r: 4.6
    mu_n: 0
    mu_p: 0
    ni: 0
    N_D: 0
    N_A: 0
    D_ion: 0
    P_lim: 0
    P0: 0
    tau_n: 1.0e-9
    tau_p: 1.0e-9
    n1: 1.0e10
    p1: 1.0e10
    B_rad: 0
    C_n: 0
    C_p: 0
    alpha: 0
    chi: 0
    Eg: 9.0

FTO_front_contact:
  role: front_contact
  optical_material: FTO
  description: "F:SnO2 front contact on glass (degenerate semiconductor approx)"
  source: "Filipic 2015, Opt. Express 23, A263"
  defaults:
    thickness: 5.0e-7
    eps_r: 9.0
    mu_n: 5.0e-3
    mu_p: 1.0e-3
    ni: 1.0e10
    N_D: 1.0e26
    N_A: 0
    D_ion: 0
    P_lim: 0
    P0: 0
    tau_n: 1.0e-9
    tau_p: 1.0e-9
    n1: 1.0e10
    p1: 1.0e10
    B_rad: 0
    C_n: 0
    C_p: 0
    alpha: 0
    chi: 4.4
    Eg: 3.5
    incoherent: false

ITO_front_contact:
  role: front_contact
  optical_material: ITO
  description: "Sn:In2O3 front contact (sputtered TCO, p-i-n stacks)"
  source: "König 2014, Opt. Mater. Express 4, 689"
  defaults:
    thickness: 1.5e-7
    eps_r: 9.0
    mu_n: 4.0e-3
    mu_p: 1.0e-3
    ni: 1.0e10
    N_D: 1.0e26
    N_A: 0
    D_ion: 0
    P_lim: 0
    P0: 0
    tau_n: 1.0e-9
    tau_p: 1.0e-9
    n1: 1.0e10
    p1: 1.0e10
    B_rad: 0
    C_n: 0
    C_p: 0
    alpha: 0
    chi: 4.4
    Eg: 3.5
    incoherent: false

