# WARNING: legacy Beer-Lambert preset. Phi=2.5e21 is ~1.44x above the true
# AM1.5G above-gap photon flux for Eg=1.55 eV (truth ~1.72e21), so the J_sc
# this preset produces is inflated by roughly the same factor. Kept as-is for
# back-compat with existing notebooks and benchmarks. For physically accurate
# optics use nip_MAPbI3_tmm.yaml, which runs the full transfer-matrix method
# against the n,k library and the regenerated ASTM G-173 AM1.5G spectrum.
device:
  V_bi: 1.1
  Phi: 2.5e21
# Device orientation & naming convention (read before comparing to literature):
#   Layer order is FRONT -> BACK: index 0 is the illuminated front face (x=0,
#   where AM1.5G enters and the Beer-Lambert / TMM generation profile peaks);
#   the last layer is the back contact. Here the front layer is the HTL, so the
#   simulator illuminates through the hole-transport side: holes are collected
#   at the front contact (phi_left = 0) and electrons at the back (phi_right =
#   V_bi). The "nip" label denotes the TRANSPORT-MATERIAL system (spiro-OMeTAD
#   HTL + TiO2 ETL = the classic regular / n-i-p material set), NOT which side
#   faces the sun. This front-HTL ordering matches the IonMonger reference
#   implementation, so ionmonger_benchmark reproduces its published metrics.
#   To model illumination through the ETL side instead, reverse the layer order.
layers:
  - name: spiro_HTL
    role: HTL
    thickness: 200e-9
    eps_r: 3.0
    mu_n: 1e-10
    mu_p: 1e-6
    ni: 1e0
    N_D: 0.0
    N_A: 2e23
    D_ion: 0.0
    P_lim: 1e30
    P0: 0.0
    tau_n: 1e-9
    tau_p: 1e-9
    n1: 1e0
    p1: 1e0
    B_rad: 1e-30
    C_n: 1e-42
    C_p: 1e-42
    alpha: 0.0

  - name: MAPbI3
    role: absorber
    thickness: 400e-9
    eps_r: 24.1
    mu_n: 2e-4
    mu_p: 2e-4
    ni: 3.2e13
    N_D: 0.0
    N_A: 0.0
    D_ion: 1e-16
    P_lim: 1.6e27
    P0: 1.6e24
    tau_n: 1e-6
    tau_p: 1e-6
    n1: 3.2e13
    p1: 3.2e13
    B_rad: 5e-22
    C_n: 1e-42
    C_p: 1e-42
    alpha: 1.3e7

  - name: TiO2_ETL
    role: ETL
    thickness: 100e-9
    eps_r: 10.0
    mu_n: 1e-5
    mu_p: 1e-10
    ni: 1e0
    N_D: 1e24
    N_A: 0.0
    D_ion: 0.0
    P_lim: 1e30
    P0: 0.0
    tau_n: 1e-9
    tau_p: 1e-9
    n1: 1e0
    p1: 1e0
    B_rad: 1e-30
    C_n: 1e-42
    C_p: 1e-42
    alpha: 0.0
