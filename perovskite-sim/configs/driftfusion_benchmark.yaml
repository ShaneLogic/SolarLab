# Driftfusion Benchmark: Calado et al. (2016), Nature Communications
# "Evidence for ion migration in hybrid perovskite solar cells with minimum hysteresis"
# DOI: 10.1038/ncomms13831
#
# Parameters adapted from Driftfusion spiro_mapi_tio2.csv
# Uses symmetric bulk SRH lifetimes (tau = 100 ns) which are appropriate
# for a model without explicit interface recombination.
#
# Key: Eg = 1.6 eV, mu = 20 cm2/Vs, tau = 100 ns, B_rad = 3.6e-18 m3/s

device:
  V_bi: 1.1
  Phi: 1.4e21
  # Driftfusion spiro_mapi_tio2 default: bulk-SRH limited, light interface SRV.
  interfaces:
    - [1.0e3, 1.0e-1]
    - [1.0e-1, 1.0e3]

layers:
  - name: spiro_HTL
    role: HTL
    thickness: 200e-9
    eps_r: 4.0
    mu_n: 2e-10
    mu_p: 2e-6
    ni: 1e0
    N_D: 0.0
    N_A: 1e24
    D_ion: 0.0
    P_lim: 1e30
    P0: 0.0
    tau_n: 1e-6
    tau_p: 1e-6
    n1: 1e0
    p1: 1e0
    B_rad: 0.0
    C_n: 0.0
    C_p: 0.0
    alpha: 0.0
    chi: 2.8
    Eg: 2.1

  - name: MAPbI3
    role: absorber
    thickness: 400e-9
    eps_r: 23.0
    mu_n: 2e-3
    mu_p: 2e-3
    ni: 1e11
    N_D: 0.0
    N_A: 0.0
    D_ion: 2.57e-16
    P_lim: 1.6e27
    P0: 1.6e24
    tau_n: 1e-7
    tau_p: 1e-7
    n1: 1e11
    p1: 1e11
    B_rad: 3.6e-18
    C_n: 0.0
    C_p: 0.0
    alpha: 1.3e7
    chi: 3.8
    Eg: 1.6

  - name: TiO2_ETL
    role: ETL
    thickness: 100e-9
    eps_r: 10.0
    mu_n: 1e-5
    mu_p: 1e-10
    ni: 1e0
    N_D: 1e24
    N_A: 0.0
    D_ion: 0.0
    P_lim: 1e30
    P0: 0.0
    tau_n: 1e-6
    tau_p: 1e-6
    n1: 1e0
    p1: 1e0
    B_rad: 0.0
    C_n: 0.0
    C_p: 0.0
    alpha: 0.0
    chi: 4.1
    Eg: 2.3
