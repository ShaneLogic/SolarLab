# nip_wideGap_FACs_1p77.yaml — wide-gap FA-Cs perovskite sub-cell preset (1.77 eV)
#
# TANDEM SUB-CELL PRESET — do not use standalone without re-tuning contacts.
# This preset represents the top junction of a Lin 2019-style all-perovskite
# two-terminal tandem (Eg_top ≈ 1.77 eV FA-Cs / Eg_bot ≈ 1.22 eV Sn-Pb).
# The tandem loader in Task 6+ will stitch this with nip_SnPb_1p22.yaml.
#
# Layer parameters are cloned from nip_MAPbI3.yaml; only the absorber Eg, chi,
# optical_material, and thickness are changed from that baseline. All other
# values carry a TODO(benchmark) comment where literature refinement is needed.
#
# References:
#   Saliba et al. JPCL 2016 (FA-Cs chi / Eg)
#   Lin et al. Nature 2019 (tandem architecture, absorber thicknesses)
device:
  # Wide-gap (1.77 eV) top sub-cell. With contact chi/Eg still at 0 the
  # band-offset path falls back to this manual value, which caps V_oc. Lin
  # 2019 reports ~1.18 V on the top sub-cell, so we pick V_bi = 1.55 V to
  # leave a realistic ~0.4 V SRH/contact loss budget. Restore the band-offset
  # path once spiro_HTL/TiO2_ETL carry literature chi/Eg/ni triples.
  V_bi: 1.42
  Phi: 2.5e21
# Layer order: HTL (left / hole-contact) → absorber → ETL (right / electron-contact)
layers:
  - name: spiro_HTL
    role: HTL
    thickness: 200e-9
    eps_r: 3.0
    mu_n: 1e-10
    mu_p: 1e-6
    ni: 1e0
    N_D: 0.0
    N_A: 2e23
    D_ion: 0.0
    P_lim: 1e30
    P0: 0.0
    tau_n: 1e-9
    tau_p: 1e-9
    n1: 1e0
    p1: 1e0
    B_rad: 1e-30
    C_n: 1e-42
    C_p: 1e-42
    alpha: 0.0
    optical_material: spiro_OMeTAD

  - name: FA_Cs_1p77
    role: absorber
    thickness: 200e-9           # Tuned for current matching against 1000nm SnPb bottom + Ag back
    eps_r: 24.1                 # TODO(benchmark): refine after Lin 2019 SI data is loaded
    mu_n: 2e-4                  # TODO(benchmark): refine after Lin 2019 SI data is loaded
    mu_p: 2e-4                  # TODO(benchmark): refine after Lin 2019 SI data is loaded
    ni: 3.2e13                  # TODO(benchmark): refine after Lin 2019 SI data is loaded
    N_D: 0.0
    N_A: 0.0
    D_ion: 1e-16                # TODO(benchmark): refine after Lin 2019 SI data is loaded
    P_lim: 1.6e27               # TODO(benchmark): refine after Lin 2019 SI data is loaded
    P0: 1.6e24                  # TODO(benchmark): refine after Lin 2019 SI data is loaded
    tau_n: 1e-6                 # TODO(benchmark): refine after Lin 2019 SI data is loaded
    tau_p: 1e-6                 # TODO(benchmark): refine after Lin 2019 SI data is loaded
    n1: 3.2e13                  # TODO(benchmark): refine after Lin 2019 SI data is loaded
    p1: 3.2e13                  # TODO(benchmark): refine after Lin 2019 SI data is loaded
    B_rad: 5e-22                # TODO(benchmark): refine after Lin 2019 SI data is loaded
    C_n: 1e-42
    C_p: 1e-42
    alpha: 1.3e7                # TODO(benchmark): refine after Lin 2019 SI data is loaded
    # NOTE: Eg/chi intentionally left at 0 (default) so compute_V_bi() falls
    # back to the manual V_bi=1.42 V above. This preset is a TANDEM SUB-CELL
    # ONLY — it is consumed by tandem_lin2019.yaml through tandem_jv, where
    # V_oc is set by the absorber bandgap and recombination, NOT by stack
    # Fermi matching. The Lin 2019 benchmark is tuned around manual V_bi.
    #
    # Stage 1c migration (Apr 2026) was attempted with chi=3.85, Eg=1.77
    # (Saliba 2016) plus literature spiro/TiO2 values — compute_V_bi landed
    # at 0.79 V because spiro_HTL/TiO2_ETL Fermi levels dominate, gutting
    # the top-cell V_oc capacity by ~0.6 V and breaking the tandem benchmark.
    # Proper FULL-tier migration here requires also re-tuning contact DOS /
    # doping / ni so compute_V_bi lands near the manual value, OR re-fitting
    # the Lin benchmark targets to the new V_bi. Deferred to a separate task.
    optical_material: FA_Cs_1p77

  - name: TiO2_ETL
    role: ETL
    thickness: 100e-9
    eps_r: 10.0
    mu_n: 1e-5
    mu_p: 1e-10
    ni: 1e0
    N_D: 1e24
    N_A: 0.0
    D_ion: 0.0
    P_lim: 1e30
    P0: 0.0
    tau_n: 1e-9
    tau_p: 1e-9
    n1: 1e0
    p1: 1e0
    B_rad: 1e-30
    C_n: 1e-42
    C_p: 1e-42
    alpha: 0.0
    optical_material: TiO2
