# IonMonger Benchmark: Courtier et al. (2019), Energy Environ. Sci.
# "How transport layer properties affect perovskite solar cell performance"
# DOI: 10.1039/C8EE01576G
# Parameter set (b): Interface-recombination limited (IonMonger default)
#
# Key differences from our nip_MAPbI3.yaml:
#   - Phi = 1.4e21 (not 2.5e21): realistic AM1.5G above-bandgap flux for Eg=1.7 eV
#   - mu_n = mu_p = 6.62e-3 (not 2e-4): D=1.7e-4 m2/s via Einstein relation
#   - ni = 2.89e10 (not 3.2e13): from Eg=1.7eV with gc=8.1e24, gv=5.8e24
#   - D_ion = 1.01e-17 (not 1e-16): Arrhenius at 298K with Ea=0.58eV
#   - P0 = 1.6e25 (not 1.6e24): higher vacancy density
#   - tau_n = 3e-9, tau_p = 3e-7: asymmetric SRH (set b)
#   - B_rad = 0: no radiative recombination (SRH dominated)
#   - N_A(HTL) = 1e24, N_D(ETL) = 1e24: symmetric doping

device:
  V_bi: 1.1
  Phi: 1.4e21
  # Interface recombination velocities (v_n, v_p) at internal heterointerfaces.
  # Courtier 2019 set (b): minority-carrier SRV high, majority-carrier SRV low.
  #   [0] HTL/perovskite: electrons are minority in HTL (blocked) → high v_n
  #   [1] perovskite/ETL: holes are minority in ETL (blocked) → high v_p
  interfaces:
    - [3.0e5, 1.0e-1]   # HTL/pero: v_n high (electron loss), v_p low
    - [1.0e-1, 3.0e5]   # pero/ETL: v_n low, v_p high (hole loss)

layers:
  - name: spiro_HTL
    role: HTL
    thickness: 200e-9
    eps_r: 3.0
    mu_n: 1e-10
    mu_p: 3.89e-5
    ni: 1e0
    N_D: 0.0
    N_A: 1e24
    D_ion: 0.0
    P_lim: 1e30
    P0: 0.0
    tau_n: 1e-9
    tau_p: 1e-9
    n1: 1e0
    p1: 1e0
    B_rad: 0.0
    C_n: 0.0
    C_p: 0.0
    alpha: 0.0
    # Courtier 2019 Table S1: spiro-OMeTAD
    chi: 2.1    # electron affinity [eV] — high CB → blocks electrons
    Eg: 3.0     # band gap [eV]

  - name: MAPbI3
    role: absorber
    thickness: 400e-9
    eps_r: 24.1
    mu_n: 6.62e-3
    mu_p: 6.62e-3
    ni: 2.89e10
    N_D: 0.0
    N_A: 0.0
    D_ion: 1.01e-17
    P_lim: 1.6e27
    P0: 1.6e25
    tau_n: 3e-9
    tau_p: 3e-7
    n1: 2.89e10
    p1: 2.89e10
    B_rad: 0.0
    C_n: 0.0
    C_p: 0.0
    alpha: 1.3e7
    chi: 3.7    # electron affinity [eV]
    Eg: 1.6     # band gap [eV] — MAPbI3

  - name: TiO2_ETL
    role: ETL
    thickness: 100e-9
    eps_r: 10.0
    mu_n: 3.89e-4
    mu_p: 1e-10
    ni: 1e0
    N_D: 1e24
    N_A: 0.0
    D_ion: 0.0
    P_lim: 1e30
    P0: 0.0
    tau_n: 1e-9
    tau_p: 1e-9
    n1: 1e0
    p1: 1e0
    B_rad: 0.0
    C_n: 0.0
    C_p: 0.0
    alpha: 0.0
    chi: 4.0    # electron affinity [eV]
    Eg: 3.2     # band gap [eV] — TiO2; high VB → blocks holes
