# scaps_mirror.yaml — SCAPS-1D partner stack mirrored for SolarLab.
#
# Mirrors the partner 1D-SCAPS configuration recorded in the SCAPS PDF
# (page 1) so that SolarLab outputs can be compared against the SCAPS
# parameter sweeps (PDF + Parameters(1).xlsx) using identical layer
# dimensions, band parameters, and bulk defect data.
#
# The schema is consumed by `perovskite_sim.scaps_compat.load_scaps_yaml`,
# which converts cgs units into SI and derives ni / tau / n1 / p1 from
# the SCAPS microscopic parameters before constructing the frozen
# DeviceStack the solver consumes. No solver, model, or boundary-
# condition code is changed.
#
# Physics tier: FAST. SolarLab's FAST mode enables the upgrades that
# SCAPS already models (thermionic emission at heterojunctions, TMM
# optics, spatial trap profile) while keeping the FULL-tier per-RHS
# additions off (Robin contacts, μ(E) field-dependent mobility, radiative
# reabsorption). FAST is therefore the closest physics overlap with
# SCAPS available without solver changes. The mobile-ion equation is
# integrated under FAST but with D_ion = 0 the ion term is zero and
# matches SCAPS' ion-frozen absorber.

device:
  # V_bi = WF(HTL) - WF(ETL) where WF = chi + (E_F - E_C). For SCAPS HTL
  # (N_A=1e18 on N_V=2.5e20) and ETL (N_D=1e18 on N_C=8e19) this gives:
  #   WF(HTL) = chi + Eg - kT*ln(N_V/N_A) = 2.40 + 3.25 - 0.143 = 5.51 eV
  #   WF(ETL) = chi + kT*ln(N_C/N_D)      = 4.10 + 0.114        = 4.21 eV
  #   V_bi    = 5.51 - 4.21 = 1.30 V
  V_bi: 1.30
  Phi: 2.5e21        # AM1.5G above-gap photon flux [m^-2 s^-1]
  mode: fast

layers:
  - name: SCAPS_HTL
    role: HTL
    thickness_nm: 20.0
    E_g_eV: 3.25
    chi_eV: 2.40
    eps_r: 11.75
    mu_n_cm2: 1.0e-3
    mu_p_cm2: 1.0e-3
    N_C_cm3: 2.5e20
    N_V_cm3: 2.5e20
    N_D_cm3: 0.0
    N_A_cm3: 1.0e18
    v_th_cm_s: 1.0e7
    optical_material: spiro_OMeTAD

  - name: SCAPS_PVK
    role: absorber
    thickness_nm: 800.0
    E_g_eV: 1.53
    chi_eV: 3.94
    eps_r: 31.0
    mu_n_cm2: 20.0
    mu_p_cm2: 20.0
    N_C_cm3: 1.0e19
    N_V_cm3: 1.0e19
    N_D_cm3: 1.0e14
    N_A_cm3: 0.0
    v_th_cm_s: 1.0e7
    # SCAPS PVK bulk defect (Perovskite-CB single-level)
    bulk_defect:
      sigma_n_cm2: 1.0e-15
      sigma_p_cm2: 1.0e-15
      N_t_cm3: 1.0e12
      E_t_eV_below_cb: 0.1
    # SCAPS-specified PVK radiative + Auger
    B_rad_cm3_s: 1.0e-12
    C_n_cm6_s: 2.3e-29
    C_p_cm6_s: 2.3e-29
    optical_material: MAPbI3
    # SCAPS PVK/ETL Gaussian interface defect is NOT populated here:
    # the Phase 4a spatial trap profile (even with the new directional
    # edge kwarg) reproduces the SCAPS magnitude but not the SCAPS
    # cliff/spike direction. See tests/integration/test_scaps_mirror_cbo_trend.py
    # for the documented xfail. Full direction parity needs interface
    # SRH with E_t-aware n1/p1 at the heterojunction node, which is
    # Phase E1 solver work and out of scope here.

  - name: SCAPS_ETL
    role: ETL
    thickness_nm: 25.0
    E_g_eV: 1.9
    chi_eV: 4.10
    eps_r: 4.2
    mu_n_cm2: 1.0e-2
    mu_p_cm2: 1.0e-5
    N_C_cm3: 8.0e19
    N_V_cm3: 8.0e19
    N_D_cm3: 1.0e18
    N_A_cm3: 0.0
    v_th_cm_s: 1.0e7
    optical_material: TiO2

# Phase E1.5 + E1.6 — cross-carrier Pauwels-Vanhoutte PVK/ETL interface
# defect with explicit Phase E1.6 calibration factor.
#
# Sampling convention: n at ETL interior (idx+1, electron-rich pool that
# grows under cliff), p at PVK interior (idx-1, hole pile-up under cliff).
# Direct σ·v_th·N_t with SCAPS N_t=1e13 cm⁻² gives SRV=1e3 m/s but
# SolarLab's discretized cross-carrier sampling reads bulk-interior
# carrier densities (n_ETL_eq ≈ 1e24 m⁻³ vs SCAPS interface-plane n)
# which over-counts recombination by ~5 orders of magnitude. Phase A
# probe data (2026-05-26, see docs/superpowers/specs/2026-05-26-e1.6-sg-face-density-spec.md
# + outputs/scaps_validation_e1_6a_probe.txt) ruled out SG-flux-extraction
# (loses cliff direction because p_ETL is machine epsilon). Option B-2
# locks the SCAPS direct N_t at its partner value and absorbs the
# 5-order discretization gap into an explicit ``calibration_factor`` on
# the InterfaceDefect dataclass — making the partner-facing data model
# transparent rather than hiding the gap in a script constant.
#
# N_t_cm2=1e13 (SCAPS direct) · calibration_factor=1e-5 → SRV_eff =
# σ·v_th·N_t · 1e-2 · cf = 1e-15 · 1e7 · 1e13 · 1e-2 · 1e-5 = 0.01 m/s,
# same effective velocity as the empirical N_t_cm2=1e8 setting that
# scaps_mirror.yaml carried before Phase E1.6. Baseline V_oc, CBO sweep,
# and PVK/ETL interface N_t sweep parities are preserved exactly.
interfaces:
  - target: PVK/ETL
    sigma_n_cm2: 1.0e-15
    sigma_p_cm2: 1.0e-15
    N_t_cm2: 1.0e12              # SCAPS PDF baseline value (PDF p12)
    v_th_cm_s: 1.0e7
    E_t_eV_below_cb: 0.6
    calibration_factor: 1.0e-4   # Phase E1.6 explicit attenuation
    # Effective SRV: σ · v_th · N_t · 1e-2 · cf
    #   = 1e-15 · 1e7 · 1e12 · 1e-2 · 1e-4 = 1e-2 m/s
    # Matches the pre-E1.6 empirical N_t_cm2=1e8 + cf=1.0 path exactly
    # (mathematically equivalent: 1e8 · 1e-2 = 1e12 · 1e-2 · 1e-4).
    # SCAPS PDF baseline value chosen as the YAML N_t so the validation
    # script's sweep range (SCAPS-direct N_t values) and the YAML
    # baseline use the same calibration_factor uniformly. Partner-facing:
    # N_t matches SCAPS PDF directly; the calibration_factor reflects
    # the SolarLab-vs-SCAPS discretization gap (5 orders absorbed via
    # σ·v_th·N_t·1e-2·1e-4 = SRV_eff). See
    # docs/superpowers/specs/2026-05-26-e1.6-sg-face-density-spec.md
    # for the underlying physics rationale.
