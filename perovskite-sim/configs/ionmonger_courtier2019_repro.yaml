# IonMonger / Courtier 2019 set (b) paper-reproduction preset.
#
# Purpose: match the published Courtier 2019 set (b) V_oc/J_sc/FF targets
# without changing the default ionmonger_benchmark.yaml used for physical
# heterostack validation.
#
# Differences from ionmonger_benchmark.yaml:
#   - mode: legacy, so post-baseline physics hooks are disabled.
#   - V_bi = 0.98 V. In this solver, the original V_bi = 1.10 V plus explicit
#     band offsets over-drives the heterostack and gives V_oc ~= 1.20 V. This
#     calibrated value reproduces the paper V_oc ~= 1.07 V while preserving
#     J_sc ~= 22 mA/cm2 and FF in the reported 0.70-0.80 range.
#   - chi/Eg are retained. Zeroing them collapses V_oc too far in this solver,
#     so this preset calibrates the paper convention through the Poisson BC.

device:
  mode: legacy
  V_bi: 0.98
  Phi: 1.4e21
  interfaces:
    - [3.0e5, 1.0e-1]
    - [1.0e-1, 3.0e5]

layers:
  - name: spiro_HTL
    role: HTL
    thickness: 200e-9
    eps_r: 3.0
    mu_n: 1e-10
    mu_p: 3.89e-5
    ni: 1e0
    N_D: 0.0
    N_A: 1e24
    D_ion: 0.0
    P_lim: 1e30
    P0: 0.0
    tau_n: 1e-9
    tau_p: 1e-9
    n1: 1e0
    p1: 1e0
    B_rad: 0.0
    C_n: 0.0
    C_p: 0.0
    alpha: 0.0
    chi: 2.1
    Eg: 3.0

  - name: MAPbI3
    role: absorber
    thickness: 400e-9
    eps_r: 24.1
    mu_n: 6.62e-3
    mu_p: 6.62e-3
    ni: 2.89e10
    N_D: 0.0
    N_A: 0.0
    D_ion: 1.01e-17
    P_lim: 1.6e27
    P0: 1.6e25
    tau_n: 3e-9
    tau_p: 3e-7
    n1: 2.89e10
    p1: 2.89e10
    B_rad: 0.0
    C_n: 0.0
    C_p: 0.0
    alpha: 1.3e7
    chi: 3.7
    Eg: 1.6

  - name: TiO2_ETL
    role: ETL
    thickness: 100e-9
    eps_r: 10.0
    mu_n: 3.89e-4
    mu_p: 1e-10
    ni: 1e0
    N_D: 1e24
    N_A: 0.0
    D_ion: 0.0
    P_lim: 1e30
    P0: 0.0
    tau_n: 1e-9
    tau_p: 1e-9
    n1: 1e0
    p1: 1e0
    B_rad: 0.0
    C_n: 0.0
    C_p: 0.0
    alpha: 0.0
    chi: 4.0
    Eg: 3.2
