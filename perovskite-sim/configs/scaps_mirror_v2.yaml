# scaps_mirror_v2.yaml — SCAPS-1D partner stack, defect-corrected.
#
# Phase E6 rewrite of configs/scaps_mirror.yaml that closes three defect-
# inventory gaps identified by the 2026-05-28 PDF audit
# (docs/superpowers/specs/2026-05-28-e2a-scaps-yaml-audit-vs-pdf.md):
#
#   1. PVK carried ONE bulk defect (Perovskite-CB Single, E_t=0.1 below CB)
#      → SCAPS PDF declares TWO: Perovskite-CB AND Perovskite-VB.
#      New schema:   `bulk_defects: [...]` list per layer.
#
#   2. HTL/PVK interface defect was absent.
#      → PDF declares Single, E_t=0.6, sigma=1e-19, N_t=1e12.
#      Added under `interfaces:` block with target HTL/PVK.
#
#   3. PVK/ETL interface defect was encoded as Single + sigma=1e-15 +
#      calibration_factor=1e-4 (which hid a 4-order sigma error AND the
#      Single→Gaussian distribution mismatch).
#      → Rewritten as `distribution: gaussian` with E_char=0.1 eV,
#        N_peak=5.64e8 cm^-3, sigma=1e-19. calibration_factor REMOVED.
#
# Base layer parameters (24 fields per layer) audited line-by-line against
# PDF page 1 and confirmed bit-identical to scaps_mirror.yaml.
#
# Phase E6.3 loader extension consumes this schema:
#   - `bulk_defects: list` — multi-defect parallel SRH per layer; loader
#     combines via 1/tau_total = sum(1/tau_i) and weights n1/p1 by
#     inverse-lifetime (matches arithmetic mean for identical taus).
#   - `E_t_eV_above_vb` — alternative to `E_t_eV_below_cb` for traps
#     referenced from VB; exactly one must be set per defect entry.
#   - `distribution: gaussian` — accepted on both bulk and interface
#     entries. The loader uses N_t_cm3 (bulk) or N_t_cm2 (interface)
#     directly; `E_char_eV` and `N_peak_cm3` are informational fields
#     (the PDF column-header units make standard Gaussian normalisation
#     ambiguous — see Phase E6.3 docstring in scaps_compat/loader.py).
#   - Strict-key validation: typos in defect/interface entries now raise
#     ValueError. Pre-E6.3 the loader silently dropped unrecognised
#     keys, which masked the calibration_factor unit-error class.

device:
  het_recomb_despike: 0.53   # SCAPS-emulation: de-spike heterointerface bulk-Auger double-count (base 1.121->1.168)
  dos_band_potentials: true  # effective-DOS QFL fold (now the code default; pinned so the validated baseline is self-contained)
  flat_band_metal_contacts: true   # work-function contact-reservoir floor: rescues low-N_D,ETL contact starvation so the ETL-doping V_oc trend rises with SCAPS (RMS 39 mV; the trend no de-spike fraction could fix). DORMANT at base doping -> base point + every other sweep bit-identical.
  contact_phi_B_eV: 0.42           # metal work-function offset (calibration knob); 0.42 eV minimizes the Nd_ETL RMS vs SCAPS.
  V_bi: 1.30
  Phi: 2.5e21
  mode: fast

layers:
  # Phase E10.1 — glass front substrate (optical-only, role:substrate filtered
  # from the electrical grid). Real perovskite cells are illuminated through
  # glass; omitting it left the air/spiro Fresnel reflection too high (~8 %),
  # under-counting absorber J_sc. With glass the front reflection drops to
  # ~5 % (air/glass ~4 % + index-matched glass/spiro) and absorber J_sc rises
  # 21.7→23.1 mA/cm² — a physical completion of the optical stack, NOT a
  # tuning hack. Residual to SCAPS 26.3 is SCAPS' zero-front-reflection
  # idealization (we do not remove real reflection — physics gate).
  - name: glass
    role: substrate          # optical-only; filtered from the electrical grid
    thickness_nm: 1.0e6      # 1 mm
    E_g_eV: 9.0
    chi_eV: 1.0
    eps_r: 2.25
    mu_n_cm2: 0.0
    mu_p_cm2: 0.0
    N_C_cm3: 1.0e19
    N_V_cm3: 1.0e19
    N_D_cm3: 0.0
    N_A_cm3: 0.0
    v_th_cm_s: 1.0e7
    optical_material: glass
    incoherent: true

  - name: SCAPS_HTL
    role: HTL
    thickness_nm: 20.0
    E_g_eV: 3.25
    chi_eV: 2.40
    eps_r: 11.75
    mu_n_cm2: 1.0e-3
    mu_p_cm2: 1.0e-3
    N_C_cm3: 2.5e20
    N_V_cm3: 2.5e20
    N_D_cm3: 0.0
    N_A_cm3: 1.0e18
    v_th_cm_s: 1.0e7
    optical_material: spiro_OMeTAD
    # PDF: no HTL bulk defect declared.

  - name: SCAPS_PVK
    role: absorber
    thickness_nm: 800.0
    E_g_eV: 1.53
    chi_eV: 3.94
    eps_r: 31.0
    mu_n_cm2: 20.0
    mu_p_cm2: 20.0
    N_C_cm3: 1.0e19
    N_V_cm3: 1.0e19
    N_D_cm3: 1.0e14
    N_A_cm3: 0.0
    v_th_cm_s: 1.0e7
    B_rad_cm3_s: 1.0e-12
    C_n_cm6_s: 2.3e-29
    C_p_cm6_s: 2.3e-29
    optical_material: MAPbI3
    # PDF Interface Defects table declares TWO PVK bulk-style defects:
    #   - Perovskite-CB: Single, sigma=1e-15, N_t=1e12 cm^-3, E_t=0.1 below CB
    #   - Perovskite-VB: Single, sigma=1e-15, N_t=1e12 cm^-3, E_t=0.1 above VB
    # Combined SRH lifetime per node: 1/tau_total = 1/tau_CB + 1/tau_VB.
    bulk_defects:
      - name: Perovskite-CB
        sigma_n_cm2: 1.0e-15
        sigma_p_cm2: 1.0e-15
        N_t_cm3: 1.0e12
        E_t_eV_below_cb: 0.1
        distribution: single
      - name: Perovskite-VB
        sigma_n_cm2: 1.0e-15
        sigma_p_cm2: 1.0e-15
        N_t_cm3: 1.0e12
        E_t_eV_above_vb: 0.1
        distribution: single

  - name: SCAPS_ETL
    role: ETL
    thickness_nm: 25.0
    E_g_eV: 1.9
    chi_eV: 4.10
    eps_r: 4.2
    mu_n_cm2: 1.0e-2
    mu_p_cm2: 1.0e-5
    N_C_cm3: 8.0e19
    N_V_cm3: 8.0e19
    N_D_cm3: 1.0e18
    N_A_cm3: 0.0
    v_th_cm_s: 1.0e7
    optical_material: TiO2
    # PDF: no ETL bulk defect declared.

# PDF Interface Defects table declares TWO heterointerface defects.
interfaces:
  # SCAPS sweep result: V_oc range across N_t=[1e9, 1e15] is < 1 mV (flat).
  # Interface 1 is effectively passive in the partner model but must be
  # declared for completeness (defect inventory must match SCAPS).
  - target: HTL/PVK
    sigma_n_cm2: 1.0e-19
    sigma_p_cm2: 1.0e-19
    N_t_cm2: 1.0e12
    v_th_cm_s: 1.0e7
    E_t_eV_below_cb: 0.6
    distribution: single
    # SS interface-plane-state calibration (2026-06). Attenuates ONLY the
    # steady-state interface-plane recombination channel (iface_states=True);
    # the transient bulk-node path ignores it (verified delta 0.0 mV). 0.02
    # brings the SS HTL/PVK N_t sweep from 12x over to 1.0x of SCAPS (5.3 vs
    # 5.2 mV) — this interface is near-passive in SCAPS.
    iface_state_calibration_factor: 0.02

  # SCAPS sweep result: dominant interface — V_oc range 282 mV across
  # N_t=[1e9, 1e15]. SCAPS encodes this as a Gaussian energy distribution
  # peaked at E_t=0.6 below CB with characteristic energy E_char=0.1 eV.
  # Peak density 5.64e8 cm^-3 is the SCAPS PDF reference for N_t_total=1e12.
  # The Phase E6.3 loader uses N_t_cm2=1e12 directly (the SCAPS-input total)
  # and treats E_char_eV + N_peak_cm3 as informational metadata — the PDF
  # column-header units make the standard Gaussian normalisation ambiguous
  # (ratio 5.64e-4 does not match sqrt(2*pi)*E_char ≈ 0.2507), so the YAML
  # mirrors the SCAPS GUI inputs verbatim rather than computing a synthetic
  # N_t_eff from the peak.
  # calibration_factor INTENTIONALLY OMITTED — the v1 1e-4 factor hid the
  # 4-order sigma error (1e-15 vs PDF 1e-19) and the Single→Gaussian
  # distribution mismatch. Both are corrected here.
  - target: PVK/ETL
    sigma_n_cm2: 1.0e-19
    sigma_p_cm2: 1.0e-19
    N_t_cm2: 1.0e12
    v_th_cm_s: 1.0e7
    E_t_eV_below_cb: 0.6
    distribution: gaussian
    E_char_eV: 0.1
    N_peak_cm3: 5.64e8
    # SS interface-plane-state calibration (2026-06). SS-only (transient
    # ignores it, verified delta 0.0 mV). 0.10 lands the SS base V_oc on
    # SCAPS (1.1675 vs 1.1676, -0.1 mV) and brings the Nd_ETL sweep from
    # ~2x over to 0.84x of SCAPS, while PVK/ETL N_t holds at 63%.
    iface_state_calibration_factor: 0.10
