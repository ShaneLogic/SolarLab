# SolarScale n-i-p band-aligned screening template.
#
# This template is intentionally separate from the legacy nip_MAPbI3.yaml preset.
# It exists so SolarScale imports can opt in to --activate-bandgap without
# creating a partial band-alignment state. The HTL/absorber/ETL chi/Eg values
# and V_bi baseline are copied from nip_MAPbI3_tmm.yaml, where every electrical
# layer carries explicit band data.
#
# In first-stage SolarScale screening, band_gap_hse_ev may replace only the
# absorber Eg when --activate-bandgap is passed. The importer does not infer a
# new absorber chi, ni, alpha, or n/k data from SLME or absorption-edge metadata.
# optical_material remains the MAPbI3 baseline placeholder until a later
# provenance-labeled optical workflow supplies material-specific n,k files.
device:
  V_bi: 0.79
  Phi: 2.5e21
  mode: fast
layers:
  - name: glass
    role: substrate
    thickness: 1.0e-3
    eps_r: 2.25
    mu_n: 0.0
    mu_p: 0.0
    ni: 1.0
    N_D: 0.0
    N_A: 0.0
    D_ion: 0.0
    P_lim: 1e30
    P0: 0.0
    tau_n: 1.0e-9
    tau_p: 1.0e-9
    n1: 1.0
    p1: 1.0
    B_rad: 0.0
    C_n: 0.0
    C_p: 0.0
    alpha: 0.0
    optical_material: glass
    incoherent: true

  - name: spiro_HTL
    role: HTL
    thickness: 200e-9
    eps_r: 3.0
    mu_n: 1e-10
    mu_p: 1e-6
    ni: 1e0
    N_D: 0.0
    N_A: 2e23
    chi: 2.05
    Eg: 3.05
    D_ion: 0.0
    P_lim: 1e30
    P0: 0.0
    tau_n: 1e-9
    tau_p: 1e-9
    n1: 1e0
    p1: 1e0
    B_rad: 1e-30
    C_n: 1e-42
    C_p: 1e-42
    alpha: 0.0
    optical_material: spiro_OMeTAD

  - name: SolarScale_absorber_template
    role: absorber
    thickness: 400e-9
    eps_r: 24.1
    mu_n: 2e-4
    mu_p: 2e-4
    ni: 3.2e13
    N_D: 0.0
    N_A: 0.0
    chi: 3.7
    Eg: 1.6
    D_ion: 1e-16
    P_lim: 1.6e27
    P0: 1.6e24
    tau_n: 1e-6
    tau_p: 1e-6
    n1: 3.2e13
    p1: 3.2e13
    B_rad: 5e-22
    C_n: 1e-42
    C_p: 1e-42
    alpha: 1.3e7
    optical_material: MAPbI3

  - name: TiO2_ETL
    role: ETL
    thickness: 100e-9
    eps_r: 10.0
    mu_n: 1e-5
    mu_p: 1e-10
    ni: 1e0
    N_D: 1e24
    N_A: 0.0
    chi: 4.0
    Eg: 3.2
    D_ion: 0.0
    P_lim: 1e30
    P0: 0.0
    tau_n: 1e-9
    tau_p: 1e-9
    n1: 1e0
    p1: 1e0
    B_rad: 1e-30
    C_n: 1e-42
    C_p: 1e-42
    alpha: 0.0
    optical_material: TiO2
