# CIGS thin-film solar cell: ZnO / CdS / CIGS heterostructure
# Reference: Gloeckler & Sites (2005), Thin Solid Films 480-481, 241
# Cu(In,Ga)Se2 with Ga/(Ga+In)~0.3, Eg~1.15 eV
#
# D_ion = 0 in every layer (no mobile ionic species in inorganic stack).
# Interface SRV: high on minority-carrier side of each heterojunction.

device:
  V_bi: 1.0
  Phi: 2.5e21   # AM1.5G above-bandgap flux for Eg~1.15 eV
  interfaces:
    - [1.0e-1, 1.0e5]   # ZnO/CdS: holes minority in ZnO side → v_p high
    - [1.0e5, 1.0e-1]   # CdS/CIGS: electrons minority in CIGS p-type side near junction

layers:
  - name: ZnO_window
    role: ETL
    thickness: 200e-9
    eps_r: 9.0
    mu_n: 1.0e-2      # ~100 cm^2/Vs
    mu_p: 2.5e-3
    ni: 1e-3
    N_D: 1e24         # n+ window (1e18 cm^-3)
    N_A: 0.0
    D_ion: 0.0
    P_lim: 1e30
    P0: 0.0
    tau_n: 1e-9
    tau_p: 1e-9
    n1: 1e0
    p1: 1e0
    B_rad: 0.0
    C_n: 0.0
    C_p: 0.0
    alpha: 0.0
    chi: 4.4
    Eg: 3.3

  - name: CdS_buffer
    role: buffer
    thickness: 50e-9
    eps_r: 10.0
    mu_n: 1.0e-2
    mu_p: 2.5e-3
    ni: 1e-3
    N_D: 1e22         # lightly n-type (1e16 cm^-3)
    N_A: 0.0
    D_ion: 0.0
    P_lim: 1e30
    P0: 0.0
    tau_n: 1e-10
    tau_p: 1e-10
    n1: 1e0
    p1: 1e0
    B_rad: 0.0
    C_n: 0.0
    C_p: 0.0
    alpha: 1e6        # strong parasitic absorption in buffer
    chi: 4.2
    Eg: 2.4

  - name: CIGS_absorber
    role: absorber
    thickness: 2.0e-6   # 2 um typical
    eps_r: 13.6
    mu_n: 1.0e-2        # ~100 cm^2/Vs
    mu_p: 2.5e-3        # ~25 cm^2/Vs
    ni: 7.3e9           # Eg=1.15 eV at 300 K
    N_D: 0.0
    N_A: 1e22           # p-type (1e16 cm^-3)
    D_ion: 0.0
    P_lim: 1e30
    P0: 0.0
    tau_n: 1e-8         # 10 ns minority lifetime
    tau_p: 1e-8
    n1: 7.3e9
    p1: 7.3e9
    B_rad: 1e-16        # weak radiative
    C_n: 0.0
    C_p: 0.0
    alpha: 1e7          # ~1e5 cm^-1 above bandgap
    chi: 4.2
    Eg: 1.15
