<text x="116.0" y="604.0" font-family="Arial, Helvetica, sans-serif" font-size="15.2" font-weight="400" fill="#162033" text-anchor="start"><tspan x="116.0" dy="0">lateral_bc = &quot;neumann&quot;</tspan><tspan x="116.0" dy="18.5">No lateral current leaves.</tspan><tspan x="116.0" dy="18.5">dphi/dx = 0</tspan><tspan x="116.0" dy="18.5">normal carrier current = 0 at x=0,Lx.</tspan></text>
