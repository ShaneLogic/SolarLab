<text x="1420.0" y="604.0" font-family="Arial, Helvetica, sans-serif" font-size="15.2" font-weight="400" fill="#162033" text-anchor="start"><tspan x="1420.0" dy="0">Configurable through S fields.</tspan><tspan x="1420.0" dy="18.5">Missing S: ohmic Dirichlet</tspan><tspan x="1420.0" dy="18.5">S = 0: blocking / Neumann</tspan><tspan x="1420.0" dy="18.5">Finite S: Robin selective contact</tspan><tspan x="1420.0" dy="18.5">Large S: ohmic limit</tspan></text>
