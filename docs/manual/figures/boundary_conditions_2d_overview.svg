<text x="116.0" y="310.0" font-family="Arial, Helvetica, sans-serif" font-size="15.2" font-weight="400" fill="#162033" text-anchor="start"><tspan x="116.0" dy="0">lateral_bc = &quot;periodic&quot;</tspan><tspan x="116.0" dy="18.5">Left/right edges are coupled.</tspan><tspan x="116.0" dy="18.5">u(0,y) = u(Lx,y) for phi, n, p.</tspan></text>
