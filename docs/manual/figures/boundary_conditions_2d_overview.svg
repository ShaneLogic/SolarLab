<text x="1420.0" y="310.0" font-family="Arial, Helvetica, sans-serif" font-size="15.2" font-weight="400" fill="#162033" text-anchor="start"><tspan x="1420.0" dy="0">Fixed in the current 2D solver.</tspan><tspan x="1420.0" dy="18.5">Dirichlet for Poisson:</tspan><tspan x="1420.0" dy="18.5">y=0: phi = 0</tspan><tspan x="1420.0" dy="18.5">y=Ly: phi = Vbi - Vapp</tspan></text>
