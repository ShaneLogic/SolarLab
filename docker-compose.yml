services:
  backend:
    build:
      context: .
      dockerfile: perovskite-sim/Dockerfile.backend
    image: solarlab-backend:dev
    environment:
      PEROVSKITE_BLAS_PIN: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./perovskite-sim:/app
    ports:
      - "8000:8000"
    command:
      - uvicorn
      - backend.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

  frontend:
    build:
      context: .
      dockerfile: perovskite-sim/frontend/Dockerfile
    image: solarlab-frontend:dev
    environment:
      VITE_API_BASE: http://127.0.0.1:8000
    volumes:
      - ./perovskite-sim/frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command:
      - npm
      - run
      - dev
      - --
      - --host
      - 0.0.0.0

  notebook:
    profiles:
      - notebook
    build:
      context: .
      dockerfile: perovskite-sim/Dockerfile.backend
    image: solarlab-backend:dev
    environment:
      PEROVSKITE_BLAS_PIN: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./perovskite-sim:/app
    ports:
      - "8888:8888"
    command:
      - jupyter
      - lab
      - --ip=0.0.0.0
      - --port=8888
      - --no-browser
      - --allow-root
      - --ServerApp.token=solarlab

volumes:
  frontend_node_modules:
